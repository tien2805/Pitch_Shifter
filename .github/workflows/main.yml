name: FPGA CI Simulation

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  simulate:
    name: Run Verilog Testbench
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Icarus Verilog
      run: |
        sudo apt-get update
        sudo apt-get install -y iverilog

    - name: Generate Input Audio (Python)
      working-directory: ./sim
      run: |
        python plot_demo.py generate

    - name: Compile RTL and Testbench (Icarus Verilog)
      working-directory: ./sim
      run: |
        # Compile all RTL modules and the testbench into a simulation executable 'demo.vvp'
        iverilog -o demo.vvp ../rtl/*.v tb_demo.v

    - name: Run Simulation
      working-directory: ./sim
      run: |
        # Run the executable, generating demo_output.txt
        vvp demo.vvp

    - name: Check Output File
      working-directory: ./sim
      run: |
        if [ ! -f "demo_output.txt" ]; then
          echo "ERROR: demo_output.txt was not generated!"
          exit 1
        fi
        
        # Verify the file is not empty and has generated some lines
        LINES=$(wc -l < demo_output.txt)
        echo "Simulation generated $LINES samples."
        if [ "$LINES" -eq 0 ]; then
          echo "ERROR: Output file is empty!"
          exit 1
        fi
